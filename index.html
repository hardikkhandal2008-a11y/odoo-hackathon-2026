<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author Profiles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            max-width: 800px;
            margin: 0 auto 30px auto;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            width: 150px;
            transition: transform 0.2s, background 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            background-color: #eef2ff;
        }
        .info-box {
            background: #fff;
            max-width: 500px;
            margin: 0 auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <h1>Our Team Authors</h1>
    <p class="subtitle">Click an author card to view their details.</p>

    <div class="container">
        <div class="card" onclick="showAuthor('Hardik')">Hardik</div>
        <div class="card" onclick="showAuthor('Ankit')">Ankit</div>
        <div class="card" onclick="showAuthor('Himanshu')">Himanshu</div>
        <div class="card" onclick="showAuthor('Parth')">Parth</div>
    </div>

    <div class="info-box" id="info">
        Select an author above to see their info.
    </div>

    <script>
        const data = {
            Hardik: "Hardik specializes in front-end design, UI/UX optimization, and clean interactive layouts.",
            Ankit: "Ankit focuses on backend logic, system architecture, and performance security.",
            Himanshu: "Himanshu is a creative content writer and data researcher focusing on modern web tech.",
            Parth: "Parth handles project testing, quality assurance, and seamless deployment strategies."
        };

        function showAuthor(name) {
            document.getElementById('info').innerHTML = `<strong>${name}</strong><br><br>${data[name]}`;
        }
    </script>

</body>
</html>
